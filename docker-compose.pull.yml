# Run reviewer app from pre-built Docker Hub images (no local build).
#
# Usage:
#   docker compose -f docker-compose.pull.yml pull
#   docker compose -f docker-compose.pull.yml up -d
#
# Portainer: set stack env vars (or use env_file path below). Both services must share reviewer-net.
# App UI: http://localhost:8080  |  API: http://localhost:4000/api

services:
  reviewer-backend:
    image: vicharanashala/reviewer-api:${IMAGE_TAG:-latest}
    container_name: reviewer-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      APP_PORT: "4000"
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-service-account.json
    volumes:
      - ${GCP_CREDENTIALS_HOST_PATH:-/opt/reviewer/secrets/gcp-service-account.json}:/run/secrets/gcp-service-account.json:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - reviewer-net

  reviewer-frontend:
    image: vicharanashala/reviewer-frontend:${IMAGE_TAG:-latest}
    container_name: reviewer-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      reviewer-backend:
        condition: service_healthy
    networks:
      - reviewer-net

networks:
  reviewer-net:
    driver: bridge
