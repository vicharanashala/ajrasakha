# Run reviewer app from pre-built Docker Hub images (no local build).
#
# Ports (set in .env):
#   APP_PORT          — API listen port inside reviewer-backend (nginx uses the same value)
#   BACKEND_HOST_PORT — host port published for the API (defaults to APP_PORT)
#   FRONTEND_PORT     — host port for the UI
#
# Usage:
#   docker compose -f docker-compose.pull.yml pull
#   docker compose -f docker-compose.pull.yml up -d

services:
  reviewer-backend:
    image: vicharanashala/reviewer-api:${IMAGE_TAG:-latest}
    container_name: reviewer-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_HOST_PORT:-${APP_PORT:-4000}}:${APP_PORT:-4000}"
    env_file:
      - .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-service-account.json
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:$$APP_PORT/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - reviewer-net

  reviewer-frontend:
    image: vicharanashala/reviewer-frontend:${IMAGE_TAG:-latest}
    container_name: reviewer-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      APP_PORT: ${APP_PORT:-4000}
    volumes:
      - ./frontend/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      reviewer-backend:
        condition: service_healthy
    networks:
      - reviewer-net

networks:
  reviewer-net:
    driver: bridge
