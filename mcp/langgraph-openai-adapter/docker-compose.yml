services:
  langgraph-openai-adapter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph-openai-adapter
    ports:
      - "${PROXY_PORT:-8001}:8001"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
