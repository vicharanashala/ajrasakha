name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  NODE_VERSION: 22

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --name mongodb
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --entrypoint bash
          -c "mongod --replSet rs0 --bind_ip_all &

            for i in \$(seq 1 30); do
              mongosh --quiet --eval 'try { rs.initiate({_id:\"rs0\", members:[{_id:0, host:\"localhost:27017\"}]}); } catch(e) { }' 2>/dev/null && break
              sleep 1
            done

            tail -f /dev/null"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Start backend
        working-directory: backend
        run: |
          cp .env.example .env
          pnpm install --frozen-lockfile
          pnpm dev &
          npx wait-on http://localhost:8080/api/health --timeout 60000
        env:
          MONGODB_URI: mongodb://localhost:27017/ajrasakha_test
          NODE_ENV: development

      - name: Run Playwright E2E tests
        run: pnpm test:e2e
        env:
          E2E_MODERATOR_EMAIL: ${{ secrets.E2E_MODERATOR_EMAIL }}
          E2E_MODERATOR_PASSWORD: ${{ secrets.E2E_MODERATOR_PASSWORD }}
          E2E_EXPERT_EMAIL: ${{ secrets.E2E_EXPERT_EMAIL }}
          E2E_EXPERT_PASSWORD: ${{ secrets.E2E_EXPERT_PASSWORD }}
          CI: true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
