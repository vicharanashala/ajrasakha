name: AjraSakha Frontend Staging Deployment

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch / tag / SHA to deploy to staging"
        required: true
        default: "staging_branch/main_copy"
        type: string

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  build:
    name: Build Frontend (staging)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
          run_install: false

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install

      - name: Guard — staging API
        env:
          VITE_API_BASE_URL_STAGING: ${{ secrets.VITE_API_BASE_URL_STAGING }}
        run: |
          test -n "$VITE_API_BASE_URL_STAGING"

      - name: Build frontend
        env:
          VITE_ENABLE_MOCKS: ${{ secrets.VITE_ENABLE_MOCKS }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_STAGING }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY_STAGING }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_STAGING }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID_STAGING }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_STAGING }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_STAGING }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID_STAGING }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID_STAGING }}
          VITE_SARVAM_API_KEY: ${{ secrets.VITE_SARVAM_API_KEY_STAGING }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY_STAGING }}
        run: |
          cd frontend
          pnpm exec vite build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build-staging
          path: ./frontend/dist
          retention-days: 1

  deploy_staging:
    name: Deploy to Firebase Hosting (Staging)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate staging Firebase config
        run: |
          mkdir -p deploy/staging
          cat > deploy/staging/firebase.json <<'JSON'
          {
            "hosting": {
              "site": "ajrasakha-staging-594",
              "public": "dist",
              "rewrites": [
                {
                  "source": "/api/**",
                  "run": {
                    "serviceId": "reviewer-backend-staging",
                    "region": "asia-south1"
                  }
                },
                {
                  "source": "**",
                  "destination": "/index.html"
                }
              ]
            }
          }
          JSON
          cat > deploy/staging/.firebaserc <<'JSON'
          {
            "projects": {
              "default": "${{ secrets.FIREBASE_PROJECT_ID_STAGING }}"
            }
          }
          JSON

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build-staging
          path: ./deploy/staging/dist

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_GH_SA_KEY }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: ./deploy/staging
