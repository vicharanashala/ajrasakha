name: Staging Reviewer Service

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Staging
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_CLIENT_SECRET }}
          tags: tag:ci-cd

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Debug VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            whoami
            hostname
            hostname -I
            pwd
            ls -la /home
          EOF
      
      - name: Deploy Staging
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            set -e

            cd /home/bibint2918/ajrasakha-staging

            echo "Pulling latest code..."
            sudo git pull

            echo "Building frontend..."
            cd frontend
            sudo pnpm run build

            echo "Building backend..."
            cd ../backend
            sudo pnpm run build

            echo "Restarting service..."
            sudo systemctl restart ajrasakha-staging

            echo "Checking service status..."
            sudo systemctl is-active ajrasakha-staging

            echo "Deployment completed successfully"
          EOF
