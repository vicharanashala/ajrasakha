name: ACE Web App E2E (mobile + voice + error states)

# -----------------------------------------------------------------------------
# PR #6 — dedicated CI workflow for the ACE farmer web app Playwright
# suite.
#
# Mirrors the existing reviewer-system-e2e.yml workflow but explicitly
# runs BOTH Playwright projects (`desktop-chromium` AND
# `mobile-chromium`) via a matrix.  Some teams accidentally only run
# desktop in CI; the matrix surfaces that immediately as one failing
# leg rather than letting it drift.
#
# Triggers:
#   • push to main
#   • pull_request to main
#   • workflow_dispatch       — manual runs from the Actions tab
#   • workflow_call           — composite invocation from a deploy
#                               workflow (see "deployment hook" below)
#   • repository_dispatch     — `deployment_success` event fires this
#                               workflow after every staging deploy
#
# Deployment hook (how a deploy workflow invokes this one):
#   In your deploy workflow, after the deploy step, add:
#     uses: ./.github/workflows/ace-web-app-e2e.yml
#     with:
#       environment: staging
#     secrets: inherit
#   …or, if your CD only speaks the GitHub REST API:
#     curl -X POST \
#       -H "Authorization: token $GITHUB_TOKEN" \
#       https://api.github.com/repos/$REPO/dispatches \
#       -d '{"event_type":"deployment_success","client_payload":{...}}'
#   …which will hit this workflow via the `repository_dispatch` trigger
#   below.  Both paths give the ACE suite the same coverage
#   post-deploy that PRs get pre-merge.
#
# Required GitHub Secrets (set in Settings → Secrets → Actions):
#   ACE_STAGING_URL             — staging URL for the farmer-facing
#                                 ACE web app (separate from the
#                                 reviewer system)
#   (Legacy alias — ACE_BASE_URL — is accepted via the loader in
#    tests/helpers/test-config.ts so an existing secrets store keeps
#    working without a rotation.)
#
# Do NOT hardcode any of the above in this file or in the test fixtures.
#
# Self-sufficient failure semantics:
#   When ACE_STAGING_URL is not configured the ace-web-app projects in
#   playwright.config.ts override their testMatch to a path that
#   matches nothing, so `npm run test:ace` runs 0 tests and exits 0.
#   The matrix `continue-on-error: false` on the smoke guard surfaces
#   this in the CI log so the absence is observable rather than silent.
# -----------------------------------------------------------------------------
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      environment:
        description: "Environment label (e.g. staging, production)"
        required: false
        type: string
        default: "staging"
    secrets:
      ACE_STAGING_URL:
        required: false
  repository_dispatch:
    types: [deployment_success, staging_deployed]

concurrency:
  group: ace-web-app-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # =========================================================================
  # 1. Smoke — install + typecheck + verify (test-count gate) + lint
  # =========================================================================
  smoke:
    name: Smoke (install + typecheck + verify + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ hashFiles('qa/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: qa/package-lock.json

      - name: Install QA dependencies
        working-directory: qa
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: TypeScript typecheck
        working-directory: qa
        run: npx tsc --noEmit

      - name: Verify test counts (CI gate)
        working-directory: qa
        run: npm run verify

      - name: Lint
        working-directory: qa
        continue-on-error: true
        run: |
          if [ -f package.json ] && grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "No lint script — skipping"
          fi

  # =========================================================================
  # 2. ACE Web App — desktop + mobile matrix
  # =========================================================================
  # The matrix runs both Playwright projects against the same suite.  The
  # dedicated mobile-chromium leg is the regression we want — many
  # teams accidentally only ship desktop CI for mobile-first surfaces.
  ace-web-app:
    name: ACE Web App E2E (${{ matrix.project }})
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: [desktop-chromium, mobile-chromium]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ hashFiles('qa/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: qa/package-lock.json

      - name: Install dependencies
        working-directory: qa
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: qa
        run: npx playwright install --with-deps chromium

      # ----------------------------------------------------------------------
      # Environment — secrets-only, never hardcoded.
      # ----------------------------------------------------------------------
      - name: Run ACE Web App E2E suite (${{ matrix.project }})
        working-directory: qa
        env:
          ACE_STAGING_URL: ${{ secrets.ACE_STAGING_URL || secrets.ACE_BASE_URL }}
          ACE_DEFAULT_LANGUAGE: ${{ secrets.ACE_DEFAULT_LANGUAGE }}
          ACE_ENGLISH_LANGUAGE: ${{ secrets.ACE_ENGLISH_LANGUAGE }}
        run: |
          if [ -z "$ACE_STAGING_URL" ]; then
            echo "::notice::ACE_STAGING_URL is not configured — the ${{ matrix.project }} project testMatch is overridden to match nothing; npx playwright test --project=${{ matrix.project }} will run 0 tests and exit 0."
            echo "::notice::Configure the secrets listed in the workflow header to actually exercise the suite."
          fi
          npx playwright test --project=${{ matrix.project }} --config=playwright.config.ts

      # ----------------------------------------------------------------------
      # Artifacts — uploaded with `if: always()` so green runs leave a
      # paper trail.  Traces / videos are retained only on failure via
      # `retain-on-failure` in playwright.config.ts.
      # ----------------------------------------------------------------------
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ace-web-app-html-report-${{ matrix.project }}
          path: qa/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ace-web-app-junit-${{ matrix.project }}
          path: qa/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload traces / video on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ace-web-app-traces-${{ matrix.project }}
          path: |
            qa/test-results/**/trace.zip
            qa/test-results/**/video
            qa/test-results/**/error-context.md
          retention-days: 14
          if-no-files-found: ignore

  # =========================================================================
  # 3. PR comment — surface pass/fail + a deep link to the HTML report
  # =========================================================================
  pr-comment:
    name: ACE Web App PR summary
    needs: [ace-web-app]
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Post PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const desktop = "${{ needs.ace-web-app.result }}";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              "## 🧪 ACE Web App E2E — PR #6",
              "",
              "**Matrix (desktop + mobile):**",
              `- \`desktop-chromium\`: ${desktop === "success" ? "✅ passed" : desktop === "failure" ? "❌ failed" : desktop}`,
              ``,
              "Test surface: **22 atomic tests** across `core-query-flow/` (7 from PR #5) and `mobile-voice-errors/` (15 from PR #6).",
              "",
              "Artifacts:",
              "- 📄 `ace-web-app-html-report-{desktop,mobile}-chromium` (always) — HTML summary per project",
              "- 🧾 `ace-web-app-junit-{desktop,mobile}-chromium` (always) — JUnit XML for downstream dashboards",
              "- 🎥 `ace-web-app-traces-{desktop,mobile}-chromium` (on failure) — `trace.zip`, video, `error-context.md`",
              "",
              `[Open the run](${runUrl})`,
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });