name: API Deployment

on:
  workflow_dispatch:
    inputs:
      target_api:
        description: 'API to build and push'
        required: true
        default: 'acc_api'
        type: choice
        options:
          - acc_api
          - ans_gen_pop
          - golden_api

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: Build & Push ${{ github.event.inputs.target_api }}
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push acc_api
        if: github.event.inputs.target_api == 'acc_api'
        uses: docker/build-push-action@v5
        with:
          context: ./apis/acc_api
          file: ./apis/acc_api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/acc_api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/acc_api:${{ github.sha }}

      - name: Build & Push ans_gen_pop
        if: github.event.inputs.target_api == 'ans_gen_pop'
        uses: docker/build-push-action@v5
        with:
          context: ./apis/ans_gen_pop
          file: ./apis/ans_gen_pop/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ans_gen_pop:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ans_gen_pop:${{ github.sha }}

      - name: Build & Push golden_api
        if: github.event.inputs.target_api == 'golden_api'
        uses: docker/build-push-action@v5
        with:
          context: ./ai
          file: ./ai/ajrasakha/tools/golden/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/golden_api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/golden_api:${{ github.sha }}
