name: AjraSakha Backend Production Deployment

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  DOCKER_IMAGE: reviewer-api
  GCP_REGION: asia-south1
  GCP_SERVICE: reviewer-backend

jobs:
  build:
    name: Build and Push Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.app
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  deploy_production:
    name: Deploy to Cloud Run (Production)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_GH_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: ${{ env.GCP_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

          secrets: |
            DB_URL=AJRASAKHA_REVIEWER_SYS_DB_URI_PROD:latest
            
          env_vars: |
            NODE_ENV=production
            APP_PORT=${{ secrets.APP_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            VAPID_EMAIL=${{ secrets.VAPID_EMAIL }}
            VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
            INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
            PLIVO_AUTH_ID=${{ secrets.PLIVO_AUTH_ID }}
            PLIVO_AUTH_TOKEN=${{ secrets.PLIVO_AUTH_TOKEN }}
            LGD_STATES_API_URL=${{ secrets.LGD_STATES_API_URL }}
            LGD_DISTRICTS_API_URL=${{ secrets.LGD_DISTRICTS_API_URL }}
            LGD_SUBDISTRICTS_API_URL=${{ secrets.LGD_SUBDISTRICTS_API_URL }}
            LGD_VILLAGES_API_URL=${{ secrets.LGD_VILLAGES_API_URL }}
            LGD_API_KEY=${{ secrets.LGD_API_KEY }}
            ANNAM_URL_ANALYTICS=${{ secrets.ANNAM_URL_ANALYTICS }}
            ANNAM_DB_ANALYTICS=${{ secrets.ANNAM_DB_ANALYTICS }}
            DB_URL_ANALYTICS=${{ secrets.DB_URL_ANALYTICS }}
            DB_NAME_ANALYTICS=${{ secrets.DB_NAME_ANALYTICS }}
            TAILSCALE_AUTHKEY=${{ secrets.TAILSCALE_AUTHKEY }}
            GCP_MEDIA_BUCKET=${{ secrets.GCP_MEDIA_BUCKET }}
          flags: --allow-unauthenticated
