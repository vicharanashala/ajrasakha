name: Reviewer System E2E (queue + analytics + CI)

# -----------------------------------------------------------------------------
# PR #4 — dedicated CI workflow for the Reviewer System E2E suite.
#
# This workflow is intentionally separate from the existing
# `.github/workflows/e2e.yml` (which also runs reviewer-system + webapp):
#   • Faster signal — the @reviewer suite is gated on its own job so a
#     reviewer-only failure does not get swamped by the broader smoke
#     job, and PRs that only touch analytics/queue tests get a tighter
#     feedback loop.
#   • Deployment hook — this workflow is the one deploy pipelines invoke
#     after pushing to staging (see "deployment hook" below).
#
# Triggers:
#   • push to main            — every merge is verified on main
#   • pull_request to main    — every PR is verified before merge
#   • workflow_dispatch       — manual runs from the Actions tab
#   • workflow_call           — composite / reusable invocation from a
#                               deploy workflow (see "deployment hook")
#   • repository_dispatch     — `deployment_success` event fires this
#                               workflow after every staging deploy
#                               (mirrors `.github/workflows/e2e.yml`)
#
# Deployment hook (how a deploy workflow invokes this one):
#   In your deploy workflow, after the deploy step, add:
#     uses: ./.github/workflows/reviewer-system-e2e.yml
#     with:
#       environment: staging
#     secrets: inherit
#   …or, if your CD only speaks the GitHub REST API:
#     curl -X POST \
#       -H "Authorization: token $GITHUB_TOKEN" \
#       https://api.github.com/repos/$REPO/dispatches \
#       -d '{"event_type":"deployment_success","client_payload":{...}}'
#   …which will hit this workflow via the `repository_dispatch` trigger
#   below.  Both paths give the reviewer-system suite the same coverage
#   post-deploy that PRs get pre-merge.
#
# Required GitHub Secrets (set in Settings → Secrets → Actions):
#   REVIEWER_STAGING_URL                 — staging URL (e.g. https://desk.ajrasakha.in)
#   MODERATOR_TEST_EMAIL / _PASSWORD     — moderator credentials
#   EXPERT_TEST_EMAIL / _PASSWORD        — expert credentials (allocation + reputation tests)
#   EXPERT_TEST_2_EMAIL / _PASSWORD      — second expert (re-allocation)
#   REVIEWER_TEST_EMAIL / _PASSWORD      — peer reviewer credentials
#   COORDINATOR_TEST_EMAIL / _PASSWORD   — coordinator credentials
#   (Legacy aliases — REVIEWER_BASE_URL, REVIEWER_*_EMAIL / _PASSWORD —
#    are accepted as fallbacks via the loader in
#    `tests/helpers/test-config.ts`.  No code change required to keep
#    using them.)
#
# Do NOT hardcode any of the above in this file or in the test fixtures.
#
# -----------------------------------------------------------------------------
# Fork-PR / no-secrets semantics (read this before changing the gates):
#
#   GitHub intentionally does NOT pass repo secrets to workflows triggered
#   by `pull_request` from a fork — a fork PR is untrusted code, and
#   leaking secrets to it would let any contributor exfiltrate them.  As
#   a result, on a fork PR `secrets.REVIEWER_STAGING_URL` evaluates to
#   the empty string and `secrets.MODERATOR_TEST_*` are unset.
#
#   To keep fork PRs from going permanently red, this workflow:
#
#     1. Runs `check-secrets` as a separate, cheap job that probes whether
#        the staging secret is configured.  Its only side-effect is
#        writing `has_secrets=true|false` to its outputs — no code is
#        executed with the secret value, so this is safe on every PR.
#
#     2. Gates the `e2e` job with
#            needs: check-secrets
#            if: needs.check-secrets.outputs.has_secrets == 'true'
#        so the entire job is *skipped* (not failed) on fork PRs.  GitHub
#        treats a skipped required status check as satisfying branch
#        protection, so the PR can still merge.
#
#     3. Runs `static-checks` unconditionally so every PR — including
#        fork PRs without secrets — gets *some* signal:
#          - typecheck (npx tsc --noEmit)
#          - lint
#          - test-count floor (npm run verify)
#          - mocked Playwright run (page.route() stubs — no staging needed)
#        The mocked suite catches the "I broke the build" class of bugs
#        that would otherwise only surface in real E2E runs.
#
#   If you ever migrate this workflow to `pull_request_target` to get
#   secrets on fork PRs, see PR review notes — that requires explicit
#   maintainer approval for outside-collaborator workflow runs.
# -----------------------------------------------------------------------------
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      environment:
        description: "Environment label (e.g. staging, production)"
        required: false
        type: string
        default: "staging"
    secrets:
      REVIEWER_STAGING_URL:
        required: false
      MODERATOR_TEST_EMAIL:
        required: false
      MODERATOR_TEST_PASSWORD:
        required: false
      EXPERT_TEST_EMAIL:
        required: false
      EXPERT_TEST_PASSWORD:
        required: false
      EXPERT_TEST_2_EMAIL:
        required: false
      EXPERT_TEST_2_PASSWORD:
        required: false
      REVIEWER_TEST_EMAIL:
        required: false
      REVIEWER_TEST_PASSWORD:
        required: false
      COORDINATOR_TEST_EMAIL:
        required: false
      COORDINATOR_TEST_PASSWORD:
        required: false
  repository_dispatch:
    types: [deployment_success, staging_deployed]

# Serialize on the ref so concurrent pushes / PRs don't thrash staging
# (or double-spend test-data mutations).  Cancel-in-progress keeps
# feedback tight when the developer pushes again before the prior
# run finishes.
concurrency:
  group: reviewer-system-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # =========================================================================
  # 0. check-secrets — cheap, unconditional probe that sets has_secrets.
  #    Runs on every trigger (including fork PRs) because it touches no
  #    code and exposes no secret values.  Its sole purpose is to gate the
  #    `e2e` job below so fork PRs cleanly skip the staging suite.
  # =========================================================================
  check-secrets:
    name: Check staging secrets
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      has_secrets: ${{ steps.probe.outputs.has_secrets }}
    steps:
      - name: Probe REVIEWER_STAGING_URL
        id: probe
        env:
          # Read the secret into a shell var WITHOUT expanding it into a
          # step output.  GitHub masks secrets in logs but the safest
          # posture is to never echo the value at all — we only check
          # whether the variable is non-empty.
          REVIEWER_STAGING_URL: ${{ secrets.REVIEWER_STAGING_URL || secrets.REVIEWER_BASE_URL }}
        run: |
          if [ -n "$REVIEWER_STAGING_URL" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::REVIEWER_STAGING_URL is not configured — the e2e job will be skipped (this is normal for fork PRs)."
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

  # =========================================================================
  # 1. static-checks — typecheck + lint + verify + mocked Playwright.
  #    Runs unconditionally so every PR (including fork PRs) gets real
  #    signal.  No staging URL required.
  # =========================================================================
  static-checks:
    name: Static checks (typecheck + lint + verify + mocked E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Cache only when the lockfile exists on the checked-out ref —
          # setup-node@v4 emits a hard error otherwise, which was
          # breaking every PR that didn't yet contain qa/package-lock.json.
          cache: ${{ hashFiles('qa/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: qa/package-lock.json

      - name: Install QA dependencies
        working-directory: qa
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: TypeScript typecheck
        working-directory: qa
        run: npx tsc --noEmit

      - name: Verify test counts (CI gate)
        working-directory: qa
        run: npm run verify

      - name: Lint
        working-directory: qa
        # Lint is non-blocking: warnings about staging-data variance or
        # unused placeholder helpers are noise, not signal.  Typecheck +
        # verify already gate real correctness.
        continue-on-error: true
        run: |
          if [ -f package.json ] && grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "No lint script — skipping"
          fi

      - name: Install Playwright Chromium (mocked run only needs the browser)
        working-directory: qa
        run: npx playwright install --with-deps chromium

      - name: Run mocked Playwright suite
        working-directory: qa
        # `.mocked.spec.ts` files use page.route() to stub the API — they
        # never reach staging.  This is the job that actually verifies a
        # fork PR (which can't see real secrets) isn't trivially broken.
        run: npm run test:mocked

      - name: Upload mocked-run HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-system-mocked-html-report
          path: qa/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload mocked-run JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-system-mocked-junit
          path: qa/test-results
          retention-days: 14
          if-no-files-found: ignore

  # =========================================================================
  # 2. e2e — full reviewer-system suite against real staging.
  #    Gated on check-secrets.has_secrets so fork PRs (where the secret
  #    is intentionally absent) skip the entire job cleanly.
  # =========================================================================
  e2e:
    name: Reviewer System E2E (queue + analytics)
    needs: [static-checks, check-secrets]
    # Two-gate pattern: needs check-secrets to know the flag, and the if
    # expression reads it.  Both required so a missing check-secrets job
    # doesn't silently fall through to running e2e without a flag.
    if: needs.check-secrets.outputs.has_secrets == 'true'
    runs-on: ubuntu-latest
    # 20 minutes is enough for ~31 atomic tests on a slow staging cluster;
    # a hung test past this point should fail the job rather than block CI.
    timeout-minutes: 20
    env:
      # Canonical (PR #1+) names — secrets pass-through with legacy alias fallback.
      REVIEWER_STAGING_URL: ${{ secrets.REVIEWER_STAGING_URL || secrets.REVIEWER_BASE_URL }}
      MODERATOR_TEST_EMAIL: ${{ secrets.MODERATOR_TEST_EMAIL || secrets.REVIEWER_MODERATOR_EMAIL }}
      MODERATOR_TEST_PASSWORD: ${{ secrets.MODERATOR_TEST_PASSWORD || secrets.REVIEWER_MODERATOR_PASSWORD }}
      EXPERT_TEST_EMAIL: ${{ secrets.EXPERT_TEST_EMAIL || secrets.REVIEWER_EXPERT_EMAIL }}
      EXPERT_TEST_PASSWORD: ${{ secrets.EXPERT_TEST_PASSWORD || secrets.REVIEWER_EXPERT_PASSWORD }}
      EXPERT_TEST_2_EMAIL: ${{ secrets.EXPERT_TEST_2_EMAIL || secrets.REVIEWER_EXPERT_2_EMAIL }}
      EXPERT_TEST_2_PASSWORD: ${{ secrets.EXPERT_TEST_2_PASSWORD || secrets.REVIEWER_EXPERT_2_PASSWORD }}
      REVIEWER_TEST_EMAIL: ${{ secrets.REVIEWER_TEST_EMAIL || secrets.REVIEWER_REVIEWER_EMAIL }}
      REVIEWER_TEST_PASSWORD: ${{ secrets.REVIEWER_TEST_PASSWORD || secrets.REVIEWER_REVIEWER_PASSWORD }}
      COORDINATOR_TEST_EMAIL: ${{ secrets.COORDINATOR_TEST_EMAIL || secrets.REVIEWER_COORDINATOR_EMAIL }}
      COORDINATOR_TEST_PASSWORD: ${{ secrets.COORDINATOR_TEST_PASSWORD || secrets.REVIEWER_COORDINATOR_PASSWORD }}
      # Pass the legacy aliases through too, so older code paths can
      # also resolve cleanly if a future task slips through.
      REVIEWER_BASE_URL: ${{ secrets.REVIEWER_BASE_URL }}
      REVIEWER_MODERATOR_EMAIL: ${{ secrets.REVIEWER_MODERATOR_EMAIL }}
      REVIEWER_MODERATOR_PASSWORD: ${{ secrets.REVIEWER_MODERATOR_PASSWORD }}
      REVIEWER_EXPERT_EMAIL: ${{ secrets.REVIEWER_EXPERT_EMAIL }}
      REVIEWER_EXPERT_PASSWORD: ${{ secrets.REVIEWER_EXPERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ hashFiles('qa/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: qa/package-lock.json

      - name: Install dependencies
        working-directory: qa
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: qa
        run: npx playwright install --with-deps chromium

      - name: Run Reviewer System E2E suite
        working-directory: qa
        run: npm run test:reviewer

      # ----------------------------------------------------------------------
      # Artifacts — uploaded with `if: always()` so even green runs leave a
      # paper trail.  Traces / video / screenshots are retained on failure
      # via `retain-on-failure` in playwright.config.ts.
      # ----------------------------------------------------------------------
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-system-html-report
          path: qa/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload JUnit XML + test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-system-junit
          path: qa/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload traces / screenshots / video (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-system-traces
          path: |
            qa/test-results/**/trace.zip
            qa/test-results/**/video
            qa/test-results/**/error-context.md
          retention-days: 14
          if-no-files-found: ignore

  # =========================================================================
  # 3. PR comment — surface pass/fail + a deep link to the HTML report.
  #    `needs: e2e` (with `if: always()`) means a *skipped* e2e job is
  #    reported as "skipped" rather than blocking the comment.
  # =========================================================================
  pr-comment:
    name: Reviewer System PR summary
    needs: [e2e, static-checks]
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Post PR summary
        uses: actions/github-script@v7
        env:
          E2E_RESULT: ${{ needs.e2e.result }}
          STATIC_RESULT: ${{ needs.static-checks.result }}
        with:
          script: |
            const e2e = process.env.E2E_RESULT;
            const sc = process.env.STATIC_RESULT;
            const e2eVerdict =
              e2e === "success" ? "✅ Reviewer-System E2E passed (31 tests against staging)" :
              e2e === "failure" ? "❌ Reviewer-System E2E failed" :
              e2e === "skipped" ? "⚠️ Reviewer-System E2E skipped (no staging secrets — typical for fork PRs)" :
              "⚠️ Reviewer-System E2E: " + e2e;
            const scVerdict =
              sc === "success" ? "✅ Static checks (typecheck + lint + verify + mocked E2E) passed" :
              sc === "failure" ? "❌ Static checks failed" :
              "⚠️ Static checks: " + sc;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              "## 🧪 Reviewer System E2E — PR #4",
              "",
              `- ${scVerdict}`,
              `- ${e2eVerdict}`,
              "",
              "Test surface: **31 atomic tests** across `moderator/`, `error-boundary-ui/`, and the new `analytics/` folder (queue details + analytics dashboard).",
              "",
              "Artifacts:",
              "- 📄 `reviewer-system-html-report` (on E2E run) — HTML summary",
              "- 🧾 `reviewer-system-junit` (on E2E run) — JUnit XML for downstream dashboards",
              "- 🎥 `reviewer-system-traces` (on E2E failure) — `trace.zip`, video, `error-context.md`",
              "- 🧪 `reviewer-system-mocked-html-report` / `-junit` (always) — mocked-network run that does not require staging secrets",
              "",
              `[Open the run](${runUrl})`,
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
