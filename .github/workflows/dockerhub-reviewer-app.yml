# Build and push reviewer backend + frontend images to Docker Hub.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN
#   VITE_FIREBASE_API_KEY
#   VITE_FIREBASE_AUTH_DOMAIN
#   VITE_FIREBASE_PROJECT_ID
#   VITE_FIREBASE_STORAGE_BUCKET
#   VITE_FIREBASE_MESSAGING_SENDER_ID
#   VITE_FIREBASE_APP_ID
#   VITE_SARVAM_API_KEY
#   VITE_VAPID_PUBLIC_KEY
#
# Optional repository secrets:
#   VITE_FIREBASE_MEASUREMENT_ID
#
# Optional repository variables (Settings → Secrets and variables → Actions → Variables):
#   VITE_API_BASE_URL          (default: /api)
#   VITE_ENABLE_MOCKS            (default: false)

name: Dockerhub Reviewer App Deployment

on:
  workflow_dispatch:
    inputs:
      target_image:
        description: Select image to build and push
        required: true
        default: all
        type: choice
        options:
          - all
          - backend
          - frontend

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  prepare_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate matrix
        id: set-matrix
        run: |
          MATRIX_JSON="[]"

          add_entry() {
            local name=$1
            local context=$2
            local file=$3
            local kind=$4
            OBJ="{\"image\": \"$name\", \"context\": \"$context\", \"file\": \"$file\", \"kind\": \"$kind\"}"
            MATRIX_JSON=$(echo "$MATRIX_JSON" | jq ". + [$OBJ]")
          }

          TARGET="${{ inputs.target_image }}"

          if [[ "$TARGET" == "all" || "$TARGET" == "backend" ]]; then
            add_entry "reviewer-api" "./backend" "./backend/Dockerfile.app" "backend"
          fi

          if [[ "$TARGET" == "all" || "$TARGET" == "frontend" ]]; then
            add_entry "reviewer-frontend" "./frontend" "./frontend/Dockerfile" "frontend"
          fi

          COMPACT_JSON=$(echo "$MATRIX_JSON" | jq -c .)
          echo "matrix=$COMPACT_JSON" >> "$GITHUB_OUTPUT"
          echo "Generated matrix: $COMPACT_JSON"

  build-and-push:
    needs: prepare_matrix
    name: Build & Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push backend
        if: matrix.kind == 'backend'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}

      - name: Build & Push frontend
        if: matrix.kind == 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          build-args: |
            VITE_ENABLE_MOCKS=${{ vars.VITE_ENABLE_MOCKS || 'false' }}
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api' }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
            VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
            VITE_SARVAM_API_KEY=${{ secrets.VITE_SARVAM_API_KEY }}
            VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}
