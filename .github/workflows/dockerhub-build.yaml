name: Build Container Image, Deploy to Production
on:
  workflow_dispatch:    
    inputs:
      should_build:
        description: "Build and Push"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      should_deploy:
        description: "Deploy"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"


permissions:
  contents: read
  packages: write
  id-token: write

env:
  DOCKER_IMAGE: ajrasakha-mcps
  INFISICAL_ENVIRONMENT: prod
  INFISICAL_SECRET_PATH: /annam-ajrasakha/MCPs


jobs:
  build:
    if: github.event.inputs.should_build == 'true'
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai/ajrasakha
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
