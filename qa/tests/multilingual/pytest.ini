[pytest]
addopts = -ra -q --strict-markers
testpaths = qa/tests/multilingual
python_files = test_*.py
python_functions = test_*
markers =
    smoke: quick smoke tests of the multilingual suite
    evaluator: tests for individual evaluators
    reporter: tests for the matrix / recommendation logic
    e2e: end-to-end multilingual tests through AjraSakha client