services:
  redis:
    image: redis:7-alpine
    container_name: llm_cache_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  llm-cache:
    build: .
    container_name: llm_cache_layer
    ports:
      - "9030:9030"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
