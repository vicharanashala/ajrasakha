user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # =========================================================================
    #  Performance — tuned for 400+ concurrent users per pod
    # =========================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    server_names_hash_bucket_size 128;

    # Request size limits
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # Timeouts — fail fast under load
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;
    keepalive_requests 1000;

    # =========================================================================
    #  Logging
    # =========================================================================
    log_format json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # =========================================================================
    #  Gzip compression — ~70% bandwidth savings on text payloads
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1100;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # =========================================================================
    #  FastCGI / proxy / cache defaults
    # =========================================================================
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    proxy_temp_path /var/cache/nginx/proxy_temp;
    proxy_cache_path /var/cache/nginx/cache
        levels=1:2
        keys_zone=app_cache:10m
        max_size=1g
        inactive=60m
        use_temp_path=off;

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Upstream keep-alive — pool connections to backends
    upstream backend_pool {
        least_conn;
        server backend-1:4000 max_fails=3 fail_timeout=15s weight=1;
        server backend-2:4000 max_fails=3 fail_timeout=15s weight=1;
        server backend-3:4000 max_fails=3 fail_timeout=15s weight=1;
        keepalive 64;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    upstream reviewer_web_pool {
        least_conn;
        server reviewer-web-1:80 max_fails=3 fail_timeout=15s;
        server reviewer-web-2:80 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    upstream webapp_web_pool {
        least_conn;
        server webapp-web-1:80 max_fails=3 fail_timeout=15s;
        server webapp-web-2:80 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    # Rate-limit zones (per IP) — protects against abuse
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=static_rl:10m rate=200r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Custom error pages
    error_page 502 503 504 /50x.html;
    error_page 404 /404.html;

    # ========================================================================
    #  Virtual hosts are loaded from conf.d/
    # ========================================================================
    include /etc/nginx/conf.d/*.conf;
}