# =============================================================================
#  Ajrasakha — Production site configuration
# -----------------------------------------------------------------------------
#  Routes:
#    /api/*      → backend pool (3× replicas, least-conn)
#    /desk/*     → Reviewer System frontend (2× replicas)
#    /app/*      → Farmer Web App frontend (2× replicas)
#    /           → Marketing / landing (Reviewer System by default)
#    /healthz    → Health endpoint
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# -----------------------------------------------------------------------------
# Rate-limit + connection-limit defaults applied at server level
# -----------------------------------------------------------------------------
limit_req zone=api_rl burst=120 nodelay;
limit_req zone=auth_rl burst=20 nodelay;
limit_req zone=static_rl burst=400 nodelay;
limit_conn conn_per_ip 50;

# -----------------------------------------------------------------------------
#  Default server — Reviewer System (desk.vicharanashala.ai)
# -----------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name desk.vicharanashala.ai _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(self)" always;

    # HSTS — only enable if you have HTTPS in front of this proxy
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # WebSocket support (for chat / notifications)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Hidden healthcheck endpoint (no rate limit)
    location = /healthz {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"nginx","timestamp":"$time_iso8601"}';
    }

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    # --- API: auth endpoints — stricter rate limit ---
    location ~ ^/api/(auth|login|otp|register) {
        limit_req zone=auth_rl burst=20 nodelay;

        proxy_pass http://backend_pool;
        proxy_redirect off;
        proxy_set_header X-Forwarded-Prefix /api;
    }

    # --- API: general ---
    location /api/ {
        proxy_pass http://backend_pool$request_uri;
        proxy_redirect off;
        proxy_set_header X-Forwarded-Prefix /api;

        # Cache idempotent GETs for 30s
        proxy_cache app_cache;
        proxy_cache_valid 200 30s;
        proxy_cache_valid 404 10s;
        proxy_cache_bypass $http_authorization $http_cookie;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # --- Reviewer System frontend ---
    location / {
        proxy_pass http://reviewer_web_pool;
        proxy_redirect off;
    }

    # Block dotfiles / source files
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# -----------------------------------------------------------------------------
#  Farmer Web App (ajrasakha.vicharanashala.ai)
# -----------------------------------------------------------------------------
server {
    listen 80;
    server_name ajrasakha.vicharanashala.ai;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self)" always;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Hidden healthcheck
    location = /healthz {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"nginx-webapp","timestamp":"$time_iso8601"}';
    }

    # --- API ---
    location ~ ^/api/(auth|login|otp|register) {
        limit_req zone=auth_rl burst=20 nodelay;
        proxy_pass http://backend_pool;
        proxy_redirect off;
        proxy_set_header X-Forwarded-Prefix /api;
    }

    location /api/ {
        proxy_pass http://backend_pool$request_uri;
        proxy_redirect off;
        proxy_set_header X-Forwarded-Prefix /api;
    }

    # --- SPA ---
    location / {
        proxy_pass http://webapp_web_pool;
        proxy_redirect off;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}