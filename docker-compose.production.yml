version: '3.8'

# =============================================================================
#  Ajrasakha — Production Stack
# -----------------------------------------------------------------------------
#  Designed to safely serve 400+ concurrent users through:
#    • 3× backend replicas behind a least-conn Nginx load balancer
#    • 2× reviewer-frontend replicas + 2× webapp-frontend replicas
#    • MongoDB replica set (1 primary + 2 secondaries) for read scaling
#    • Redis cache + session store
#    • Resource limits + restart policies for stability
#    • Dedicated Nginx reverse-proxy with rate limiting, gzip, caching
# =============================================================================

x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - ./.env.production
  restart: unless-stopped
  networks:
    - ajra-net
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/healthz"]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 30s
  deploy:
    resources:
      limits:
        cpus: '2.0'
        memory: 2048M
      reservations:
        cpus: '0.5'
        memory: 512M
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

x-frontend-common: &frontend-common
  restart: unless-stopped
  networks:
    - ajra-net
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
    interval: 20s
    timeout: 5s
    retries: 3
    start_period: 10s
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 512M
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # Edge — Nginx reverse proxy with load balancing, rate limiting & caching
  # ---------------------------------------------------------------------------
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: ajra-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      backend-3:
        condition: service_healthy
      reviewer-web-1:
        condition: service_healthy
      reviewer-web-2:
        condition: service_healthy
      webapp-web-1:
        condition: service_healthy
      webapp-web-2:
        condition: service_healthy
    networks:
      - ajra-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ---------------------------------------------------------------------------
  # Backend API — 3 replicas for horizontal scaling (400+ concurrent users)
  # ---------------------------------------------------------------------------
  backend-1:
    <<: *backend-common
    container_name: ajra-backend-1
    hostname: backend-1
    environment:
      - NODE_ENV=production
      - PORT=4000
      - INSTANCE_ID=backend-1

  backend-2:
    <<: *backend-common
    container_name: ajra-backend-2
    hostname: backend-2
    environment:
      - NODE_ENV=production
      - PORT=4000
      - INSTANCE_ID=backend-2

  backend-3:
    <<: *backend-common
    container_name: ajra-backend-3
    hostname: backend-3
    environment:
      - NODE_ENV=production
      - PORT=4000
      - INSTANCE_ID=backend-3

  # ---------------------------------------------------------------------------
  # Reviewer System Frontend — 2 replicas
  # ---------------------------------------------------------------------------
  reviewer-web-1:
    <<: *frontend-common
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_ENABLE_MOCKS: "false"
    container_name: ajra-reviewer-web-1
    hostname: reviewer-web-1
    environment:
      - APP_PORT=4000
      - BACKEND_UPSTREAM=backend-1
      - BACKEND_POOL=backend-1,backend-2,backend-3

  reviewer-web-2:
    <<: *frontend-common
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_ENABLE_MOCKS: "false"
    container_name: ajra-reviewer-web-2
    hostname: reviewer-web-2
    environment:
      - APP_PORT=4000
      - BACKEND_UPSTREAM=backend-1
      - BACKEND_POOL=backend-1,backend-2,backend-3

  # ---------------------------------------------------------------------------
  # Farmer Web App — 2 replicas
  # ---------------------------------------------------------------------------
  webapp-web-1:
    <<: *frontend-common
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_ENABLE_MOCKS: "false"
    container_name: ajra-webapp-web-1
    hostname: webapp-web-1
    environment:
      - APP_PORT=4000

  webapp-web-2:
    <<: *frontend-common
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_ENABLE_MOCKS: "false"
    container_name: ajra-webapp-web-2
    hostname: webapp-web-2
    environment:
      - APP_PORT=4000

  # ---------------------------------------------------------------------------
  # MongoDB — Replica set for high availability + read scaling
  # ---------------------------------------------------------------------------
  mongo-primary:
    image: mongo:7.0
    container_name: ajra-mongo-primary
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-primary:/data/db
    networks:
      - ajra-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  mongo-secondary-1:
    image: mongo:7.0
    container_name: ajra-mongo-secondary-1
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-secondary-1:/data/db
    networks:
      - ajra-net
    depends_on:
      mongo-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  mongo-secondary-2:
    image: mongo:7.0
    container_name: ajra-mongo-secondary-2
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-secondary-2:/data/db
    networks:
      - ajra-net
    depends_on:
      mongo-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  mongo-init:
    image: mongo:7.0
    container_name: ajra-mongo-init
    networks:
      - ajra-net
    depends_on:
      - mongo-primary
      - mongo-secondary-1
      - mongo-secondary-2
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        sleep 10
        mongosh --host mongo-primary:27017 --quiet --eval '
          try {
            rs.status();
            print("Replica set already initialised");
          } catch (e) {
            print("Initialising replica set...");
            rs.initiate({
              _id: "rs0",
              members: [
                { _id: 0, host: "mongo-primary:27017", priority: 2 },
                { _id: 1, host: "mongo-secondary-1:27017", priority: 1 },
                { _id: 2, host: "mongo-secondary-2:27017", priority: 1 }
              ]
            });
          }
        '

  # ---------------------------------------------------------------------------
  # Redis — caching layer + session store + rate-limit counters
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: ajra-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - ajra-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1280M

networks:
  ajra-net:
    driver: bridge
    name: ajra-net

volumes:
  mongo-primary:
  mongo-secondary-1:
  mongo-secondary-2:
  redis_data:
  nginx_cache:
  nginx_logs: