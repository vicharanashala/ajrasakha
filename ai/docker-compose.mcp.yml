services:

  mcp-agmarknet:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    command: fastmcp run ajrasakha/tools/market/market_agmarknet_tool.py --transport streamable-http --port 8001 --host 0.0.0.0
    ports:
      - "8001:8001"
    env_file: .env
    restart: unless-stopped

  mcp-enam:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    command: fastmcp run ajrasakha/tools/market/market_enam_tool.py --transport streamable-http --port 8002 --host 0.0.0.0
    ports:
      - "8002:8002"
    env_file: .env
    restart: unless-stopped

  mcp-imd:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    command: fastmcp run ajrasakha/tools/weather/weather_imd_tool.py --transport streamable-http --port 8003 --host 0.0.0.0
    ports:
      - "8003:8003"
    env_file: .env
    restart: unless-stopped

  mcp-location:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    command: fastmcp run ajrasakha/tools/location/location_tool.py --transport streamable-http --port 8004 --host 0.0.0.0
    ports:
      - "8004:8004"
    env_file: .env
    restart: unless-stopped

  mcp-golden:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    command: fastmcp run ajrasakha/tools/golden/golden_rag_tool.py --transport streamable-http --port 8005 --host 0.0.0.0
    ports:
      - "8005:8005"
    env_file: .env
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped