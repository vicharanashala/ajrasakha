# Golden DB FastAPI service only.
# Run from this directory:
#   docker compose up --build -d
# Or from ajrasakha/ai:
#   docker compose -f ajrasakha/tools/golden/docker-compose.yml up --build -d
#
# Requires env vars in ajrasakha/ai/.env (see ../../.env.example):
#   GOLDEN_MONGODB_URI, GOLDEN_MONGODB_INDEX, GOLDEN_MONGODB_SEARCH_INDEX,
#   GOLDEN_EMBEDDING_ENDPOINT, GEMMA_MODEL, GEMMA_BASE_URL

services:
  golden-api:
    build:
      context: ../../..
      dockerfile: ajrasakha/tools/golden/Dockerfile
    container_name: golden-api
    ports:
      - "8110:8005"
    env_file:
      - ../../../.env
    environment:
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
