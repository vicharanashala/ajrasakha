# VM / Portainer stack: pre-built API image, postgres3 + Redis, connection pool limits.
# Local dev: use docker-compose.yml + `aegra up` / `aegra dev` instead.
#
# Deploy:
#   docker compose -f docker-compose.portainer.yml up -d
#
# Portainer: set stack secrets (OPENAI_*, MONGODB_*, etc.). Leave DATABASE_URL /
# DATABASE_URI unset in Portainer if they pointed at host :5434 — compose sets them.
# If POSTGRES_PASSWORD3 contains @ # % etc., URL-encode the password or use POSTGRES_* only.

services:
  # --- OLD POSTGRES 1 (legacy data; API does not use) ---
  postgres:
    image: pgvector/pgvector:pg18
    container_name: ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_1:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- OLD POSTGRES 2 (legacy data; API does not use) ---
  postgres2:
    image: pgvector/pgvector:pg18
    container_name: ai-postgres2
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER2:-ai2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD2:-ai_secret2}
      POSTGRES_DB: ${POSTGRES_DB2:-ai2}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_2:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER2:-ai2}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- POSTGRES 3 (active DB for ai-api) ---
  postgres3:
    image: pgvector/pgvector:pg18
    container_name: ai-postgres3
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER3:-ai3}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD3:-ai_secret3}
      POSTGRES_DB: ${POSTGRES_DB3:-ai3}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_3:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER3:-ai3}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai:
    image: vicharanashala/ajrasakha-langgraph-api:latest
    container_name: ai-api
    restart: unless-stopped
    ports:
      - "${PORT:-2026}:${PORT:-2026}"
    environment:
      # LLM & tools
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMMA_MODEL=${GEMMA_MODEL}
      - GEMMA_BASE_URL=${GEMMA_BASE_URL}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - REMOTE_IP=${REMOTE_IP}
      - GDB_MCP_URL=${GDB_MCP_URL}
      # Golden RAG
      - GOLDEN_EMBEDDING_MODEL=${GOLDEN_EMBEDDING_MODEL}
      - GOLDEN_MONGODB_URI=${GOLDEN_MONGODB_URI}
      - GOLDEN_MONGODB_INDEX=${GOLDEN_MONGODB_INDEX}
      - GOLDEN_MONGODB_DATABASE=${GOLDEN_MONGODB_DATABASE}
      - GOLDEN_MONGODB_COLLECTION=${GOLDEN_MONGODB_COLLECTION}
      - GOLDEN_MONGODB_SEARCH_INDEX=${GOLDEN_MONGODB_SEARCH_INDEX}
      # Ag / weather APIs
      - AGMARKNET_BASE_URL=${AGMARKNET_BASE_URL}
      - ENAM_BASE_URL=${ENAM_BASE_URL}
      - IMD_CITY_BASE=${IMD_CITY_BASE}
      - IMD_MAUSAM_BASE=${IMD_MAUSAM_BASE}
      # WhatsApp / Mongo
      - WHATSAPP_MONGODB_URI=${WHATSAPP_MONGODB_URI}
      - QUESTION_SOURCE=WHATSAPP
      # Database (canonical: postgres3 on Docker network, port 5432 inside)
      - POSTGRES_USER=${POSTGRES_USER3:-ai3}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD3:-ai_secret3}
      - POSTGRES_HOST=postgres3
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB3:-ai3}
      - DATABASE_URL=postgresql://${POSTGRES_USER3:-ai3}:${POSTGRES_PASSWORD3:-ai_secret3}@postgres3:5432/${POSTGRES_DB3:-ai3}
      - DATABASE_URI=postgresql://${POSTGRES_USER3:-ai3}:${POSTGRES_PASSWORD3:-ai_secret3}@postgres3:5432/${POSTGRES_DB3:-ai3}
      # Aegra connection pools (defaults are larger)
      - SQLALCHEMY_POOL_SIZE=5
      - SQLALCHEMY_MAX_OVERFLOW=5
      - LANGGRAPH_MIN_POOL_SIZE=2
      - LANGGRAPH_MAX_POOL_SIZE=10
      # Workers (default 3 x 10 = 30 concurrent runs)
      - WORKER_COUNT=2
      - N_JOBS_PER_WORKER=3
      # Aegra server
      - AEGRA_CONFIG=aegra.json
      - AUTH_TYPE=${AUTH_TYPE:-noop}
      - PORT=${PORT:-2026}
      - REDIS_BROKER_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      # Observability
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
      - OTEL_TARGETS=${OTEL_TARGETS}
    depends_on:
      postgres3:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${PORT:-2026}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data_1:
  postgres_data_2:
  postgres_data_3:
  redis_data:
